<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Órion</title>
<style>
    body {
        background-color: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        margin: 0;
        overflow: hidden;
    }

    #terminal {
        padding: 20px;
        white-space: pre-line;
        font-size: 16px;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        background-color: #00ff00;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0; }
    }

    #errorScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        color: red;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
    }

    #errorScreen h1 {
        font-size: 60px;
        margin-bottom: 20px;
    }

    #errorScreen p {
        font-size: 22px;
        max-width: 600px;
    }

    #timer {
        margin-top: 30px;
        font-size: 30px;
        color: white;
    }
</style>
</head>
<body>

<div id="terminal"></div>

<div id="errorScreen">
    <h1>ERRO CRÍTICO NO SISTEMA</h1>
    <p>A equipe está trabalhando o máximo possível para corrigir o problema.</p>
    <div id="timer">Carregando horário...</div>
</div>

<script>
const terminal = document.getElementById("terminal");
const errorScreen = document.getElementById("errorScreen");
const timer = document.getElementById("timer");

const lines = [
    "Inicializando sistema...",
    "Carregando módulos...",
    "Verificando integridade...",
    "Iniciando protocolo...",
    "Acessando núcleo...",
    "Erro detectado...",
    "Tentando corrigir...",
    "Falha crítica identificada..."
];

let index = 0;

function typeLine() {
    if (index < lines.length) {
        terminal.innerHTML += lines[index] + "\n";
        index++;
        setTimeout(typeLine, 800);
    } else {
        setTimeout(showError, 1500);
    }
}

function showError() {
    document.body.style.backgroundColor = "black";
    terminal.style.display = "none";
    errorScreen.style.display = "flex";
    startTimer();
}

function startTimer() {
    const targetHour = 20;

    function updateTimer() {
        const now = new Date();
        const target = new Date();

        target.setHours(targetHour, 0, 0, 0);

        if (now > target) {
            target.setDate(target.getDate() + 1);
        }

        const diff = target - now;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        timer.innerHTML = `Tempo restante: ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
}

typeLine();
</script>

</body>
</html>
